<!DOCTYPE html>
<html>
<head>
    <title>Convert SVG to PNG</title>
</head>
<body>
    <h2>SVG to PNG Converter for StreamDeck</h2>
    <p>Right-click each image and save as PNG to the icons folder:</p>
    
    <h3>icon.png (Default icon)</h3>
    <canvas id="icon" width="72" height="72"></canvas>
    <br><button onclick="download('icon', 'icon.png')">Download icon.png</button>
    
    <h3>icon-offline.png (Red/Offline state)</h3>
    <canvas id="icon-offline" width="72" height="72"></canvas>
    <br><button onclick="download('icon-offline', 'icon-offline.png')">Download icon-offline.png</button>
    
    <h3>icon-online.png (Green/Live state)</h3>
    <canvas id="icon-online" width="72" height="72"></canvas>
    <br><button onclick="download('icon-online', 'icon-online.png')">Download icon-online.png</button>
    
    <h3>plugin.png (Plugin icon)</h3>
    <canvas id="plugin" width="72" height="72"></canvas>
    <br><button onclick="download('plugin', 'plugin.png')">Download plugin.png</button>
    
    <h3>category.png (Category icon)</h3>
    <canvas id="category" width="28" height="28"></canvas>
    <br><button onclick="download('category', 'category.png')">Download category.png</button>

    <script>
        const svgs = {
            'icon': `<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72"><rect width="72" height="72" rx="8" fill="#1a1a1a"/><circle cx="36" cy="36" r="20" fill="#444"/><text x="36" y="42" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="bold">KICK</text></svg>`,
            
            'icon-offline': `<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff4444"/><stop offset="100%" stop-color="#cc0000"/></linearGradient></defs><rect width="72" height="72" rx="8" fill="url(#g)"/><circle cx="36" cy="28" r="12" fill="white" opacity="0.3"/><ellipse cx="36" cy="56" rx="20" ry="10" fill="white" opacity="0.3"/><text x="36" y="18" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">OFFLINE</text></svg>`,
            
            'icon-online': `<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#44ff44"/><stop offset="100%" stop-color="#00cc00"/></linearGradient></defs><rect width="72" height="72" rx="8" fill="url(#g)"/><circle cx="36" cy="28" r="12" fill="white" opacity="0.9"/><ellipse cx="36" cy="56" rx="20" ry="10" fill="white" opacity="0.9"/><circle cx="52" cy="16" r="6" fill="#ff0"/><text x="36" y="18" text-anchor="middle" fill="#060" font-family="Arial" font-size="8" font-weight="bold">LIVE</text></svg>`,
            
            'plugin': `<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#53fc18"/><stop offset="100%" stop-color="#32a30e"/></linearGradient></defs><rect width="72" height="72" rx="8" fill="url(#g)"/><rect x="16" y="28" width="40" height="20" rx="4" fill="white"/><circle cx="52" cy="38" r="8" fill="#f44"/><circle cx="52" cy="38" r="4" fill="white"/><text x="36" y="20" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">KICK</text></svg>`,
            
            'category': `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><rect width="28" height="28" rx="4" fill="#53fc18"/><rect x="6" y="10" width="16" height="10" rx="2" fill="white"/><circle cx="20" cy="15" r="3" fill="#f44"/></svg>`
        };

        Object.keys(svgs).forEach(id => {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById(id);
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
            };
            img.src = 'data:image/svg+xml;base64,' + btoa(svgs[id]);
        });

        function download(id, filename) {
            const canvas = document.getElementById(id);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
